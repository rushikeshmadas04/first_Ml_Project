<!DOCTYPE html>
<html>
<head>
    <title>Student Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            background: white;
            color: black;
            width: 40%;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
            margin-top: 40px;
            box-shadow: 0px 0px 25px rgba(0,0,0,0.2);
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎓 Student Score Predictor</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <select name="gender" required>
            <option disabled selected>Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <select name="ethnicity" required>
            <option disabled selected>Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <select name="parental_level_of_education" required>
            <option disabled selected>Parent Education</option>
            <option value="associate's degree">Associate</option>
            <option value="bachelor's degree">Bachelor</option>
            <option value="master's degree">Master</option>
            <option value="high school">High School</option>
        </select>

        <select name="lunch" required>
            <option disabled selected>Lunch Type</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free/Reduced</option>
        </select>

        <select name="test_preparation_course" required>
            <option disabled selected>Test Prep</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <input type="number" name="reading_score" placeholder="Reading Score" min="0" max="100" required>
        <input type="number" name="writing_score" placeholder="Writing Score" min="0" max="100" required>

        <input type="submit" value="Predict Maths Score">
    </form>

    {% if results %}
        <div class="result">
            📊 Predicted Maths Score: {{ results }}
        </div>
    {% endif %}

</div>

</body>
</html>
